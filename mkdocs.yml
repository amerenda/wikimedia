# ------------------------------------------------------------------------------
# Nav + docs/ are the source of truth for importing into Postgres:
#   export DATABASE_URL=postgresql://wikimedia:…@postgres:5432/wikimedia
#   python scripts/import_from_repo.py
# Live site: FastAPI server (Dockerfile / compose.yaml) reads wiki_pages.
# Optional: `mkdocs build` still produces a static site from docs/ if needed.
# ------------------------------------------------------------------------------
site_name: Homelab Wiki
site_description: Internal documentation for apps and infrastructure
site_author: Alex

theme:
  name: material
  palette:
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Infrastructure:
    - Overview: infra/index.md
    - k3s Cluster: infra/k3s.md
    - Mac Mini: infra/mac-mini.md
    - Networking: infra/networking.md
    - Storage: infra/storage.md
    - Cluster Setup (Ansible): infra/setup.md
    - GitOps Pipeline: infra/gitops.md
    - App Factory: infra/app-factory.md
    - GitHub Runners: infra/runners.md
  - Apps:
    - Overview: apps/index.md
    - Ecdysis: apps/ecdysis.md
    - LLM Manager: apps/llm-manager.md
    - Mycroft: apps/mycroft.md
    - Mycroft — Prompt Construction: apps/mycroft-prompts.md
    - Agent KB: apps/agent-kb.md
    - Home Assistant: apps/home-assistant.md
    - Sazed (Reports): apps/sazed.md
  - Runbooks:
    - Overview: runbooks/index.md
    - etcd Recovery: runbooks/etcd-recovery.md
